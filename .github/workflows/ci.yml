name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
      - name: Install
        run: uv sync --extra dev --extra openai --extra http
      - name: Ruff (lint)
        run: uv run ruff check src tests
      - name: Ruff (format)
        run: uv run ruff format --check src tests
      - name: Mypy (strict, core)
        run: uv run mypy

  test:
    name: Test (py${{ matrix.python-version }} · ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v5
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: uv sync --extra dev --extra openai --extra http
      - name: Run tests with coverage
        run: uv run coverage run --branch --source=agenttape -m pytest -q
      - name: Coverage report
        run: uv run coverage report
      - name: Enforce core-engine coverage threshold
        run: uv run coverage report --include="*/agenttape/engine.py" --fail-under=90

  test-zero-deps:
    name: Test core with zero optional deps (stdlib YAML path)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
      - name: Install core + pytest only (no PyYAML, no adapters)
        run: |
          uv venv
          uv pip install -e . pytest
      - name: Run core tests forcing the stdlib YAML path
        env:
          AGENTTAPE_FORCE_STDLIB_YAML: "1"
        run: .venv/bin/python -m pytest -q tests/test_yaml_io.py tests/test_engine.py tests/test_core_units.py tests/test_freeze.py
