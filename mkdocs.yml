site_name: AgentTape
site_description: Deterministic record/replay of LLM and tool calls for AI agents.
site_url: https://MITHRAN-BALACHANDER.github.io/AgentTape/
repo_url: https://github.com/MITHRAN-BALACHANDER/AgentTape
repo_name: MITHRAN-BALACHANDER/AgentTape
edit_uri: edit/main/docs/

theme:
  name: material
  font:
    text: Geist
    code: Geist Mono
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - navigation.footer
    - toc.follow
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - tables
  - toc:
      permalink: true

plugins:
  - search

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Guides:
      - Mixed / partial replay: mixed-replay.md
      - Determinism: determinism.md
      - Replay with changes: replay-with-changes.md
      - Redaction & secrets: redaction.md
  - Reference:
      - Cassette format: format.md
      - Configuration: configuration.md
      - CLI: cli.md
      - pytest plugin: pytest.md
  - Extending:
      - Writing an adapter: adapters.md
  - Cookbook: cookbook.md
