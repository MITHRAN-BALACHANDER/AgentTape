site_name: AgentTape
site_description: Deterministic record/replay of LLM and tool calls for AI agents.
site_url: https://MITHRAN-BALACHANDER.github.io/AgentTape/
repo_url: https://github.com/MITHRAN-BALACHANDER/AgentTape
repo_name: MITHRAN-BALACHANDER/AgentTape
edit_uri: edit/main/docs/

theme:
  name: material
  font:
    text: Geist
    code: Geist Mono
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - toc.follow
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.tooltips
    - search.suggest
    - search.highlight
    - search.share

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/shortcuts.js

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - footnotes
  - tables
  - abbr
  - def_list
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.keys
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde
  - toc:
      permalink: true
      title: On this page

plugins:
  - search

nav:
  - Introduction:
      - What is AgentTape?: index.md
      - Why AgentTape?: why-agenttape.md
      - Installation: installation.md
      - Your First Recording: your-first-recording.md
  - Getting Started:
      - Quickstart: quickstart.md
      - Record vs Replay: record-vs-replay.md
      - Cassette Modes: cassette-modes.md
      - Configuration: configuration.md
  - Core Concepts:
      - Cassettes: cassettes.md
      - Tools: tools.md
      - Replay Engine: replay-engine.md
      - Determinism: determinism.md
      - Partial Replay: mixed-replay.md
      - Redaction: redaction.md
  - Guides:
      - Testing AI Apps: testing-ai-apps.md
      - Recording APIs: recording-apis.md
      - Recording Databases: recording-databases.md
      - Recording Vector Stores: recording-vector-stores.md
      - Recording Tools: recording-tools.md
      - Working Offline: working-offline.md
      - Debugging: debugging.md
  - Advanced:
      - Custom Adapters: adapters.md
      - Internals: internals.md
      - Performance: performance.md
      - Extending AgentTape: extending.md
  - Reference:
      - Python API: api.md
      - CLI: cli.md
      - Configuration: configuration-ref.md
      - Cassette Format: format.md
