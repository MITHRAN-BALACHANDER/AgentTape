site_name: AgentTape
site_description: Deterministic record/replay of LLM and tool calls for AI agents.
site_url: https://MITHRAN-BALACHANDER.github.io/AgentTape/
repo_url: https://github.com/MITHRAN-BALACHANDER/AgentTape
repo_name: MITHRAN-BALACHANDER/AgentTape
edit_uri: edit/main/docs/

theme:
  name: material
  font:
    text: Geist
    code: Geist Mono
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - navigation.footer
    - toc.follow
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/shortcuts.js

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - tables
  - toc:
      permalink: true

plugins:
  - search

nav:
  - Introduction:
      - What is AgentTape?: index.md
      - Why AgentTape?: why-agenttape.md
      - Installation: installation.md
      - Your First Recording: your-first-recording.md
  - Getting Started:
      - Quickstart: quickstart.md
      - Record vs Replay: record-vs-replay.md
      - Cassette Modes: cassette-modes.md
      - Configuration: configuration.md
  - Core Concepts:
      - Cassettes: cassettes.md
      - Tools: tools.md
      - Replay Engine: replay-engine.md
      - Determinism: determinism.md
      - Partial Replay: mixed-replay.md
      - Redaction: redaction.md
  - Guides:
      - Testing AI Apps: testing-ai-apps.md
      - Recording APIs: recording-apis.md
      - Recording Databases: recording-databases.md
      - Recording Vector Stores: recording-vector-stores.md
      - Recording Tools: recording-tools.md
      - Working Offline: working-offline.md
      - Debugging: debugging.md
  - Advanced:
      - Custom Adapters: adapters.md
      - Internals: internals.md
      - Performance: performance.md
      - Extending AgentTape: extending.md
  - Reference:
      - Python API: api.md
      - CLI: cli.md
      - Configuration: configuration-ref.md
      - Cassette Format: format.md
